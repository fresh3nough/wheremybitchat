<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wheremybitchat</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='%2339ff14'/></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #39ff14;
            font-family: 'Courier New', 'Lucida Console', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* -- Welcome Screen -- */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 14px;
        }
        #welcome h1 {
            color: #39ff14;
            font-size: 1.8rem;
            text-shadow: 0 0 10px #39ff14, 0 0 30px #39ff14;
            letter-spacing: 3px;
        }
        #welcome .sub {
            color: #444;
            font-size: 0.78rem;
            margin-bottom: 8px;
        }
        #welcome input {
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            text-align: center;
            width: 260px;
        }
        #welcome input::placeholder { color: #1a7a0a; }
        #welcome input:focus { box-shadow: 0 0 10px #39ff1433; }
        #welcome button {
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 10px 50px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.15s;
        }
        #welcome button:hover { background: #39ff14; color: #000; }

        /* -- App Layout -- */
        #app {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        /* Status bar */
        #statusbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 10px;
            background: #060606;
            border-bottom: 1px solid #151515;
            font-size: 0.68rem;
        }
        #relay-status { color: #39ff14; }
        #msg-count { color: #333; }

        /* Messages */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 6px 10px;
        }
        #messages::-webkit-scrollbar { width: 3px; }
        #messages::-webkit-scrollbar-track { background: #000; }
        #messages::-webkit-scrollbar-thumb { background: #1a1a1a; }

        .msg {
            padding: 1px 0;
            line-height: 1.5;
            font-size: 0.85rem;
            word-wrap: break-word;
        }
        .msg .ts { color: #282828; font-size: 0.68rem; margin-right: 2px; }
        .msg .ch { font-weight: bold; }
        .msg .nk { opacity: 0.85; }
        .msg .tx { opacity: 0.75; }

        .sys {
            color: #2a2a2a;
            font-style: italic;
            padding: 1px 0;
            font-size: 0.78rem;
        }

        /* Chat bar */
        #chatbar {
            display: flex;
            align-items: center;
            border-top: 1px solid #151515;
            padding: 8px 10px;
            gap: 8px;
            background: #060606;
        }
        #ch-tag {
            color: #bf00ff;
            font-weight: bold;
            font-size: 0.85rem;
            white-space: nowrap;
            text-shadow: 0 0 6px #bf00ff44;
            min-width: 40px;
        }
        #chatbar input {
            flex: 1;
            background: transparent;
            border: 1px solid #1a1a1a;
            color: #39ff14;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }
        #chatbar input:focus { border-color: #39ff14; }
        #chatbar input::placeholder { color: #222; }
        #chatbar button {
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.78rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.15s;
        }
        #chatbar button:hover { background: #39ff14; color: #000; }

        @media (max-width: 600px) {
            #welcome h1 { font-size: 1.3rem; }
            #welcome input { width: 220px; }
            .msg { font-size: 0.78rem; }
        }
    </style>
</head>
<body>

    <!-- Welcome Screen -->
    <div id="welcome">
        <h1>wheremybitchat</h1>
        <div class="sub">real-time nostr ephemeral chat monitor</div>
        <input type="text" id="nick-input" placeholder="pick a nickname" maxlength="20" autofocus>
        <button id="enter-btn">ENTER</button>
    </div>

    <!-- Main App -->
    <div id="app">
        <div id="statusbar">
            <span id="relay-status">connecting...</span>
            <span id="msg-count">0 msgs</span>
        </div>
        <div id="messages"></div>
        <div id="chatbar">
            <span id="ch-tag">#nym</span>
            <input type="text" id="msg-input" placeholder="message... (#channel to switch)">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script type="module">
        // ---------------------------------------------------------------------------
        // Crypto imports for Nostr event signing (secp256k1 Schnorr signatures)
        // ---------------------------------------------------------------------------
        import { schnorr } from 'https://esm.sh/@noble/curves@1.8.1/secp256k1';
        import { sha256 }   from 'https://esm.sh/@noble/hashes@1.6.1/sha256';
        import { bytesToHex } from 'https://esm.sh/@noble/hashes@1.6.1/utils';

        // ---------------------------------------------------------------------------
        // Neon color palette for cypherpunk aesthetic
        // ---------------------------------------------------------------------------
        const NEON = [
            '#39ff14', '#00fff5', '#ff00ff', '#ff6ec7',
            '#bf00ff', '#ff9500', '#4d4dff', '#ffff00',
            '#fe019a', '#0ff0fc', '#ff073a', '#7fff00'
        ];

        // Simple string hash to pick a consistent color
        function hashStr(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) - h) + s.charCodeAt(i);
                h |= 0;
            }
            return Math.abs(h);
        }

        // Return a neon color based on input string
        function colorFor(s) { return NEON[hashStr(s) % NEON.length]; }

        // ---------------------------------------------------------------------------
        // Nostr relay list (relays known to support kind 20000 ephemeral events)
        // ---------------------------------------------------------------------------
        const RELAYS = [
            'wss://relay.damus.io',
            'wss://nostr.diakod.com',
            'wss://nostr.fmt.wiz.biz',
            'wss://offchain.pub',
            'wss://eden.nostr.land',
            'wss://puravida.nostr.land',
            'wss://nostr.oxtr.dev',
            'wss://relay.nostr.com.au',
            'wss://bitcoinmaximalists.online',
            'wss://nostr.mutinywallet.com',
            'wss://nos.lol',
            'wss://lightningrelay.com',
            'wss://purplepag.es',
            'wss://relay.primal.net',
            'wss://relay.nostr.bg',
            'wss://nostr.wine',
            'wss://relay.snort.social',
            'wss://filter.nostr.wine',
            'wss://atlas.nostr.land',
            'wss://nostr.bitcoiner.social',
            'wss://nostr.mom',
            'wss://nostr-relay-jp.moctane.com',
            'wss://relay-dev.barine.co',
            'wss://r.bitcoinhold.net',
            'wss://nostr-relay.nokotaro.com',
            'wss://nostr-relay.moctane.com',
            'wss://relay.nostr.moctane.com',
            'wss://nostr.h3z.jp',
            'wss://relay-jp.nostr.moctane.com',
            'wss://relay.mymt.casa',
            'wss://nostr.kaosfield.net',
            'wss://tulip.kuee.kyoto-u.ac.jp',
            'wss://relay.current.fyi',
            'wss://nostr.lnprivate.network',
            'wss://nostr.plebchain.org',
            'wss://nostr.band',
            'wss://relay.nostrich.land',
            'wss://nostr.guru',
            'wss://brb.io',
            'wss://relay.nostr.or.jp',
            'wss://eclipse.pub',
            'wss://nostr.8k-lab.com',
            'wss://relay.nostrgraph.net',
            'wss://nostr.inosta.cc',
            'wss://nostr.h3y6e.com',
            'wss://nostr.lu.ke',
            'wss://nostr.onsats.org',
            'wss://relay.nostrati.com',
            'wss://nostr.walletofsatoshi.com',
            'wss://relay.nostr.info',
            'wss://nostr-pub.semisol.dev',
            'wss://relay.plebstr.com',
            'wss://relay.f7z.io',
            'wss://nostr.relayer.se',
            'wss://nosdrive.app',
            'wss://relay.sxclij.com',
            'wss://nostr.holybea.com',
            'wss://relayable.org',
            'wss://relay.orangepill.dev',
            'wss://relay.nostriches.org',
            'wss://no.str.cr',
            'wss://nostr.orangepill.dev',
            'wss://bostr.nokotaro.com',
            'wss://relay.mostr.pub',
            'wss://relay.nostr.band',
            'wss://relay.noswhere.com',
            'wss://search.nos.today',
            'wss://ditto.pub',
            'wss://relay.momostr.pink',
            'wss://news.utxo.one',
            'wss://algo.utxo.one',
            'wss://relays.land',
            'wss://relay.0xchat.com',
            'wss://relay.thes.ai',
            'wss://nostrrelay.taylorperron.com',
            'wss://nostr.land',
            'wss://wot.utxo.one',
            'wss://sendit.nosflare.com',
            'wss://pyramid.fiatjaf.com',
            'wss://nostr-relay.tyiu.xyz',
            'wss://theforest.nostr1.com',
            'wss://yabu.me',
            'wss://relay.nostraco.in',
            'wss://nostr-01.bolt.observer',
            'wss://strfry.iris.to',
            'wss://relay.rodbishop.nz',
            'wss://onchain.pub',
            'wss://siamstr.com',
            'wss://nerostr.xmr.rocks',
            'wss://aggr.nostr.land',
            'wss://relay.npub.bar',
            'wss://hist.nostr.land',
            'wss://us.azzamo.net',
            'wss://nostrue.com',
            'wss://relay.minibits.cash',
            'wss://relay.orange-crush.com',
            'wss://nostr.azzamo.net',
            'wss://relay.minibolt.info',
            'wss://relay.nostrplebs.com',
            'wss://relay.cocu.la',
            'wss://free.relayted.de',
            'wss://relay.wikifreedia.xyz',
            'wss://nostr.lol',
            'wss://nostrelites.org',
            'wss://relay.degmods.com',
            'wss://wot.nostr.net',
            'wss://relay.s3x.social',
            'wss://bitchat.nostr1.com'
        ];

        // ---------------------------------------------------------------------------
        // App state
        // ---------------------------------------------------------------------------
        let nickname       = '';
        let currentChannel = 'nym';
        let sk             = null;    // ephemeral private key (Uint8Array)
        let pk             = '';      // public key hex string
        let relaySockets   = {};      // url -> WebSocket
        let connectedCount = 0;
        let msgCount       = 0;
        let seenIds        = new Set();

        // ---------------------------------------------------------------------------
        // DOM references
        // ---------------------------------------------------------------------------
        const $welcome     = document.getElementById('welcome');
        const $app         = document.getElementById('app');
        const $nickInput   = document.getElementById('nick-input');
        const $enterBtn    = document.getElementById('enter-btn');
        const $messages    = document.getElementById('messages');
        const $msgInput    = document.getElementById('msg-input');
        const $sendBtn     = document.getElementById('send-btn');
        const $chTag       = document.getElementById('ch-tag');
        const $relayStatus = document.getElementById('relay-status');
        const $msgCount    = document.getElementById('msg-count');

        // ---------------------------------------------------------------------------
        // Generate an ephemeral keypair for this session
        // ---------------------------------------------------------------------------
        function generateKeys() {
            sk = crypto.getRandomValues(new Uint8Array(32));
            pk = bytesToHex(schnorr.getPublicKey(sk));
        }

        // ---------------------------------------------------------------------------
        // Create and sign a Nostr kind 20000 ephemeral event (NIP-01 compliant)
        // ---------------------------------------------------------------------------
        function createEvent(content, channel) {
            const event = {
                pubkey:     pk,
                created_at: Math.floor(Date.now() / 1000),
                kind:       20000,
                tags: [
                    ['g', channel],
                    ['n', nickname],
                    ['client', 'wheremybitchat']
                ],
                content: content
            };

            // NIP-01: event id = sha256 of the serialized event array
            const serialized = JSON.stringify([
                0, event.pubkey, event.created_at,
                event.kind, event.tags, event.content
            ]);
            const hash = sha256(new TextEncoder().encode(serialized));
            event.id  = bytesToHex(hash);
            event.sig = bytesToHex(schnorr.sign(hash, sk));
            return event;
        }

        // ---------------------------------------------------------------------------
        // Display helpers
        // ---------------------------------------------------------------------------
        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Render a chat message into the message stream
        function addMessage(channel, nick, text, timestamp) {
            const t   = new Date(timestamp * 1000);
            const ts  = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const chC = colorFor(channel);
            const nkC = colorFor(nick + '__n');

            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML =
                `<span class="ts">${ts}</span> ` +
                `<span class="ch" style="color:${chC}">[#${escapeHtml(channel)}]</span> ` +
                `<span class="nk" style="color:${nkC}">&lt;${escapeHtml(nick)}&gt;</span> ` +
                `<span class="tx" style="color:${chC}">${escapeHtml(text)}</span>`;

            $messages.appendChild(div);
            $messages.scrollTop = $messages.scrollHeight;

            msgCount++;
            $msgCount.textContent = `${msgCount} msgs`;
        }

        // Render a system/info line
        function addSystem(text) {
            const div = document.createElement('div');
            div.className = 'sys';
            div.textContent = `-- ${text}`;
            $messages.appendChild(div);
            $messages.scrollTop = $messages.scrollHeight;
        }

        // ---------------------------------------------------------------------------
        // Relay connection and subscription management
        // ---------------------------------------------------------------------------
        function connectRelay(url) {
            let ws;
            try { ws = new WebSocket(url); } catch (_) { return; }

            ws.onopen = () => {
                connectedCount++;
                updateStatus();

                // Subscribe to ALL kind 20000 events from the last hour
                const since = Math.floor(Date.now() / 1000) - 3600;
                ws.send(JSON.stringify([
                    'REQ', 'all',
                    { kinds: [20000], since, limit: 200 }
                ]));
            };

            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg[0] === 'EVENT' && msg[2]) {
                        handleEvent(msg[2]);
                    }
                } catch (_) {}
            };

            ws.onclose = () => {
                connectedCount = Math.max(0, connectedCount - 1);
                updateStatus();
                // Auto-reconnect after 5 seconds
                setTimeout(() => connectRelay(url), 5000);
            };

            ws.onerror = () => {};
            relaySockets[url] = ws;
        }

        function updateStatus() {
            $relayStatus.textContent = `${connectedCount}/${RELAYS.length} relays`;
            $relayStatus.style.color = connectedCount > 0 ? '#39ff14' : '#ff073a';
        }

        // ---------------------------------------------------------------------------
        // Handle incoming Nostr events
        // ---------------------------------------------------------------------------
        function handleEvent(event) {
            // Deduplicate across relays
            if (seenIds.has(event.id)) return;
            seenIds.add(event.id);

            // Keep the dedup set from growing unbounded
            if (seenIds.size > 5000) {
                const arr = [...seenIds];
                seenIds = new Set(arr.slice(-2500));
            }

            // Extract channel and nickname from event tags
            let channel = '??';
            let nick    = 'anon';
            for (const tag of (event.tags || [])) {
                if (tag[0] === 'g' && tag[1]) channel = tag[1];
                if (tag[0] === 'n' && tag[1]) nick    = tag[1];
            }

            // Skip empty messages
            if (!event.content || event.content.trim() === '') return;

            addMessage(channel, nick, event.content, event.created_at);
        }

        // ---------------------------------------------------------------------------
        // Send a message to the current channel
        // ---------------------------------------------------------------------------
        function sendMessage() {
            const text = $msgInput.value.trim();
            if (!text) return;

            // Channel switch: if the entire input is #something with no spaces
            if (text.startsWith('#') && text.length > 1 && !text.includes(' ')) {
                const ch = text.substring(1).toLowerCase();
                currentChannel = ch;
                $chTag.textContent = `#${currentChannel}`;
                $chTag.style.color = colorFor(currentChannel);
                addSystem(`switched to #${currentChannel}`);
                $msgInput.value = '';
                return;
            }

            // Build and sign the event
            const event = createEvent(text, currentChannel);

            // Publish to all connected relays
            for (const url of Object.keys(relaySockets)) {
                const ws = relaySockets[url];
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(['EVENT', event]));
                }
            }

            $msgInput.value = '';
        }

        // ---------------------------------------------------------------------------
        // App entry point
        // ---------------------------------------------------------------------------
        function start() {
            nickname = $nickInput.value.trim() || `anon${Math.floor(Math.random() * 9999)}`;
            generateKeys();

            $welcome.style.display = 'none';
            $app.style.display     = 'flex';

            addSystem(`connected as ${nickname} [${pk.substring(0, 8)}]`);
            addSystem(`sending to #${currentChannel} -- type #channelname to switch`);

            for (const url of RELAYS) {
                connectRelay(url);
            }
            $msgInput.focus();
        }

        // ---------------------------------------------------------------------------
        // Event listeners
        // ---------------------------------------------------------------------------
        $enterBtn.addEventListener('click', start);
        $nickInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') start(); });
        $sendBtn.addEventListener('click', sendMessage);
        $msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
